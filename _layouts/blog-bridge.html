<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description }}">
    <title>{{ page.title }}</title>

    <!-- css -->
     <link rel="stylesheet" href="/assets/css/blog/blog-bridge.css">
     <link rel="stylesheet" href="/assets/css/misc/navbar.css">
     <link rel="stylesheet" href="/assets/css/misc/footer.css">
     <!-- endCss -->

     <!-- remixIcons -->
      <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
      <!-- endRemixIcons -->

    <!-- googleFonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
     <!-- endGoogleFonts -->

</head>
<body>
    {% include navbar.html %}
    <div class="main_containt">
        <div class="post-list">
            <h1>NetHydra | Blog</h1>
            <ul class="post-list-scope">
                {% for post in site.posts %}
                <li>
                    <img src="{{ post.thumbnail }}">
                    <div class="post-description">
                        <span>
                        <i class="ri-alarm-line"></i>
                            {{ post.date | date: "%-d %B %Y" }}
                        </span>
                        <a href="{{ post.url }}">
                            {{ post.title }}
                        </a>
                        <p>
                            {{ post.description }}
                        </p>
                    </div>
                    <a href="{{ post.url }}" id="readme-button">
                        READ ME
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
    {% include footer.html %}
    <script src="/assets/scripts/navbar.js"></script>
</body>
</html>
