<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description }}">
    <title>{{ page.title }}</title>

    <!-- css -->
     <link rel="stylesheet" href="/assets/css/doc/docs.css">
     <link rel="stylesheet" href="/assets/css/misc/navbar.css">
     <link rel="stylesheet" href="/assets/css/misc/footer.css">
    <!-- endCss -->
     <!-- endCSS -->

    <!-- remixIcons -->
     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <!-- endremixicons -->

    <!-- googleFonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
     <!-- endGoogleFonts -->

</head>
<body>
    {% include navbar.html %}
    <div class="main_doc">
        <aside class="sidebar">
            <div class="inside-sidebar">
                <a href="../">
                    <i class="ri-arrow-left-s-line"></i> {{ page.category }}
                </a>
                <section class="doc-links">
                    <ul>
                        {% for post in site.policy %}
                        <li>
                            <a href="{{ post.url }}">
                                {{ post.title }}
                            </a>
                        </li>
                        {% endfor %}
                    </ul>
                </section>
            </div>
        </aside>
        <section class="inside_doc">
            <h1>
                {{ page.title }}
            </h1>
            <div class="readme">
                {{ content }}
            </div>
        </section>
    </div>
    {% include footer.html %}
    <script src="/assets/scripts/navbar.js"></script>
</body>
</html>
